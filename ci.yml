name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore KGV.Tests/KGV.Tests.csproj

      - name: Test
        run: dotnet test KGV.Tests/KGV.Tests.csproj -c Release --no-restore
